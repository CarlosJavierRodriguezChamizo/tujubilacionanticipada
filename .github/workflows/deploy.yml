name: Build y Deploy a Vercel

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'
      - 'src/pages/**'
      - 'src/components/**'
      - 'src/layouts/**'
      - 'src/**'
      - 'astro.config.mjs'
      - 'package.json'
  # Permite lanzar el pipeline manualmente desde la pestaña Actions.
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Validar + Build + Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Validar frontmatter EEAT
        run: node scripts/validate-frontmatter.mjs

      - name: Build Astro
        run: npm run build

      - name: Deploy a Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Smoke test — verificar HTTP 200
        run: |
          # Reintenta hasta ~2 min para dar margen a la propagación de Vercel.
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L https://tujubilacionanticipada.com)
            echo "Intento $i — HTTP status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site OK"
              exit 0
            fi
            sleep 10
          done
          echo "El site no devolvió 200 tras varios intentos (último: $STATUS)"
          exit 1

      - name: Email — deploy exitoso
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_TS: ${{ github.event.head_commit.timestamp }}
          REPO: ${{ github.repository }}
        run: |
          BODY="Nuevo artículo publicado correctamente.

          ${COMMIT_MSG}

          Fecha: ${COMMIT_TS}
          Ver en: https://tujubilacionanticipada.com/blog
          Logs: https://github.com/${REPO}/actions"
          PAYLOAD=$(jq -n \
            --arg to "$ALERT_EMAIL" \
            --arg subject "✅ tujubilacionanticipada.com — Artículo publicado" \
            --arg text "$BODY" \
            '{from: "Pipeline TJA <onboarding@resend.dev>", to: $to, subject: $subject, text: $text}')
          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"

      - name: Email — fallo en el pipeline
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_TS: ${{ github.event.head_commit.timestamp }}
          REPO: ${{ github.repository }}
        run: |
          BODY="Ha fallado algún paso del pipeline de publicación.

          Commit: ${COMMIT_MSG}
          Fecha: ${COMMIT_TS}

          Revisa los logs:
          https://github.com/${REPO}/actions"
          PAYLOAD=$(jq -n \
            --arg to "$ALERT_EMAIL" \
            --arg subject "❌ tujubilacionanticipada.com — Fallo en el pipeline" \
            --arg text "$BODY" \
            '{from: "Pipeline TJA <onboarding@resend.dev>", to: $to, subject: $subject, text: $text}')
          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
