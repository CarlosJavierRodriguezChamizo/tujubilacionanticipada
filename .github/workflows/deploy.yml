name: Build y Deploy a Vercel

on:
  push:
    # `main`: despliegues directos (ediciones manuales).
    # `claude/auto-publish`: rama donde la routine publica sin necesitar permiso
    # de push directo a `main`; este workflow la promociona a `main` tras un deploy OK.
    branches: [main, "claude/auto-publish"]
    paths:
      - 'src/content/blog/**'
      - 'src/pages/**'
      - 'src/components/**'
      - 'src/layouts/**'
      - 'src/**'
      - 'astro.config.mjs'
      - 'package.json'
  # Permite lanzar el pipeline manualmente desde la pestaña Actions.
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Validar + Build + Deploy
    runs-on: ubuntu-latest
    # Necesario para que el paso "Promover a main" pueda hacer push con GITHUB_TOKEN.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Historia completa para poder hacer fast-forward de main.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Validar frontmatter EEAT
        run: node scripts/validate-frontmatter.mjs

      - name: Build Astro
        run: npm run build

      - name: Deploy a Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # CLI oficial de Vercel (siempre actualizado). Sustituye a
          # amondnet/vercel-action, que fijaba una versión obsoleta del CLI.
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" | tail -1)
          echo "Deploy URL: $DEPLOY_URL"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test — verificar HTTP 200
        env:
          # Verifica la URL real del despliegue (siempre activa), no un dominio
          # personalizado que podría no estar configurado todavía.
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$DEPLOY_URL")
            echo "Intento $i — HTTP $STATUS ($DEPLOY_URL)"
            if [ "$STATUS" = "200" ]; then
              echo "Site OK"
              exit 0
            fi
            sleep 10
          done
          echo "El despliegue no devolvió 200 tras varios intentos (último: $STATUS)"
          exit 1

      # Auto-merge: si el deploy desde la rama de la routine fue exitoso y el sitio
      # responde 200, promociona el commit a `main` (fast-forward). Así la routine
      # NUNCA necesita permiso de push directo a `main`: pushea a `claude/auto-publish`
      # y este paso lo lleva a `main`. El push con GITHUB_TOKEN no re-dispara el workflow,
      # por lo que no se produce un bucle de despliegues.
      - name: Promover a main (auto-merge)
        if: success() && github.ref == 'refs/heads/claude/auto-publish'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Promocionando ${GITHUB_SHA} a main (fast-forward)…"
          git push origin "HEAD:main"

      - name: Email — deploy exitoso
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_TS: ${{ github.event.head_commit.timestamp }}
          REPO: ${{ github.repository }}
        run: |
          BODY="Nuevo artículo publicado correctamente.

          ${COMMIT_MSG}

          Fecha: ${COMMIT_TS}
          Ver en: https://tujubilacionanticipada.com/blog
          Logs: https://github.com/${REPO}/actions"
          PAYLOAD=$(jq -n \
            --arg to "$ALERT_EMAIL" \
            --arg subject "✅ tujubilacionanticipada.com — Artículo publicado" \
            --arg text "$BODY" \
            '{from: "Tu Jubilación Anticipada <avisos@tujubilacionanticipada.com>", to: $to, subject: $subject, text: $text}')
          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"

      - name: Email — fallo en el pipeline
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_TS: ${{ github.event.head_commit.timestamp }}
          REPO: ${{ github.repository }}
        run: |
          BODY="Ha fallado algún paso del pipeline de publicación.

          Commit: ${COMMIT_MSG}
          Fecha: ${COMMIT_TS}

          Revisa los logs:
          https://github.com/${REPO}/actions"
          PAYLOAD=$(jq -n \
            --arg to "$ALERT_EMAIL" \
            --arg subject "❌ tujubilacionanticipada.com — Fallo en el pipeline" \
            --arg text "$BODY" \
            '{from: "Tu Jubilación Anticipada <avisos@tujubilacionanticipada.com>", to: $to, subject: $subject, text: $text}')
          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
