<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Ilustración editorial plana de una persona con movilidad reducida junto a un documento con una marca de verificación, en tonos azules">
  <rect width="1200" height="675" fill="#f4f6fa" />
  <circle cx="360" cy="340" r="230" fill="#dfe8f6" />

  <!-- Documento con marca de verificación -->
  <g transform="translate(700,180)">
    <rect x="0" y="0" width="260" height="320" rx="18" fill="#ffffff" stroke="#c7d6ee" stroke-width="4" />
    <rect x="36" y="48" width="188" height="16" rx="8" fill="#b3cdec" />
    <rect x="36" y="92" width="150" height="16" rx="8" fill="#b3cdec" />
    <rect x="36" y="136" width="170" height="16" rx="8" fill="#b3cdec" />
    <circle cx="130" cy="236" r="56" fill="#2a5396" />
    <path d="M104 236 L124 258 L160 212" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Persona en silla de ruedas -->
  <g transform="translate(210,300)">
    <circle cx="150" cy="-140" r="44" fill="#1c3257" />
    <path d="M120 -96 q30 -14 60 0 l14 90 q-44 20 -88 0 z" fill="#2a5396" />
    <path d="M150 -20 l0 60" stroke="#2a5396" stroke-width="26" stroke-linecap="round" />
    <path d="M132 -70 l-70 60" stroke="#1c3257" stroke-width="18" stroke-linecap="round" />
    <circle cx="130" cy="130" r="110" fill="none" stroke="#2a5396" stroke-width="16" />
    <circle cx="130" cy="130" r="6" fill="#1c3257" />
    <circle cx="40" cy="80" r="30" fill="none" stroke="#1c3257" stroke-width="12" />
    <path d="M150 40 l60 -10" stroke="#1c3257" stroke-width="14" stroke-linecap="round" />
  </g>

  <!-- Motivo calendario, sutil -->
  <g transform="translate(980,470)" opacity="0.9">
    <rect x="0" y="0" width="140" height="120" rx="14" fill="#ffffff" stroke="#c7d6ee" stroke-width="4" />
    <rect x="0" y="0" width="140" height="34" rx="14" fill="#84acdd" />
    <line x1="30" y1="-14" x2="30" y2="14" stroke="#1c3257" stroke-width="6" stroke-linecap="round" />
    <line x1="110" y1="-14" x2="110" y2="14" stroke="#1c3257" stroke-width="6" stroke-linecap="round" />
    <circle cx="70" cy="80" r="10" fill="#2a5396" />
  </g>
</svg>
