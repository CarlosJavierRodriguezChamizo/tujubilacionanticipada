<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Ilustración editorial plana de un camión de transporte profesional en una carretera, en tonos azules">
  <rect width="1200" height="675" fill="#f4f6fa" />
  <circle cx="880" cy="230" r="200" fill="#dfe8f6" />

  <!-- Carretera -->
  <rect x="0" y="470" width="1200" height="120" fill="#e3e8f0" />
  <rect x="0" y="470" width="1200" height="10" fill="#c7d6ee" />
  <g fill="#ffffff">
    <rect x="80" y="522" width="70" height="14" rx="7" />
    <rect x="260" y="522" width="70" height="14" rx="7" />
    <rect x="440" y="522" width="70" height="14" rx="7" />
    <rect x="620" y="522" width="70" height="14" rx="7" />
    <rect x="800" y="522" width="70" height="14" rx="7" />
    <rect x="980" y="522" width="70" height="14" rx="7" />
  </g>

  <!-- Camión -->
  <g transform="translate(300,300)">
    <rect x="0" y="60" width="360" height="130" rx="14" fill="#2a5396" />
    <rect x="380" y="100" width="150" height="90" rx="12" fill="#1c3257" />
    <rect x="410" y="118" width="70" height="46" rx="8" fill="#b3cdec" />
    <circle cx="90" cy="200" r="42" fill="#1c3257" />
    <circle cx="90" cy="200" r="16" fill="#dfe8f6" />
    <circle cx="450" cy="200" r="42" fill="#1c3257" />
    <circle cx="450" cy="200" r="16" fill="#dfe8f6" />
  </g>

  <!-- Señal de carretera, sutil -->
  <g transform="translate(150,180)">
    <rect x="-8" y="0" width="16" height="140" fill="#c7d6ee" />
    <rect x="-70" y="0" width="180" height="56" rx="10" fill="#84acdd" />
  </g>

  <!-- Motivo reloj/calendario, sutil -->
  <g transform="translate(980,470)">
    <circle cx="0" cy="0" r="70" fill="#ffffff" stroke="#c7d6ee" stroke-width="4" />
    <line x1="0" y1="0" x2="0" y2="-42" stroke="#2a5396" stroke-width="8" stroke-linecap="round" />
    <line x1="0" y1="0" x2="30" y2="10" stroke="#1c3257" stroke-width="8" stroke-linecap="round" />
    <circle cx="0" cy="0" r="7" fill="#1c3257" />
  </g>
</svg>
