  <defs>
    <clipPath id="disc"><circle cx="116" cy="106" r="34"/></clipPath>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f6efe1"/>
  <!-- Banda navy inferior, guiño a las ilustraciones editoriales -->
  <path d="M0 470 L1200 380 L1200 630 L0 630 Z" fill="#26324e"/>
  <path d="M0 470 L1200 380 L1200 430 L0 520 Z" fill="#bb6038" opacity="0.9"/>

  <!-- Marca: emblema amanecer -->
  <circle cx="116" cy="106" r="34" fill="#f6efe1"/>
  <g clip-path="url(#disc)">
    <circle cx="116" cy="111" r="14" fill="#bb6038"/>
    <path d="M80,109 C 90,103 100,105.5 116,107 C 132,108.5 142,103 152,105.5 L152,142 L80,142 Z" fill="#2c3a59"/>
    <path d="M80,120 C 92,114 104,117.5 116,120 C 128,122.5 140,117.5 152,121" fill="none" stroke="#f6efe1" stroke-width="2"/>
    <path d="M80,121.6 C 92,115.6 104,119.1 116,121.6 C 128,124.1 140,119.1 152,122.6 L152,142 L80,142 Z" fill="#20293f"/>
  </g>
  <circle cx="116" cy="106" r="34" fill="none" stroke="#26324e" stroke-width="2"/>

  <text x="166" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#26324e">Tu Jubilación Anticipada</text>

  <text x="80" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#20242c">Entiende tu pensión.</text>
  <text x="80" y="384" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#a8542f">Decide cuándo jubilarte.</text>

  <text x="80" y="588" font-family="Arial, system-ui, sans-serif" font-size="26" fill="#e3d6bb">tujubilacionanticipada.com</text>
